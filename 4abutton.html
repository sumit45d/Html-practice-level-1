<style>
  .subscribe-button{
    background-color: rgb(200, 0, 0);
    color: white;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    margin-left: 20px;
    padding-top: 10px;
    padding-bottom:10px;
    padding-left: 16px;
    padding-right: 16px;
     transition:opacity 0.15s;
    vertical-align: top;

  }
  .subscribe-button:hover{
    opacity: 0.8;
  }

  .subscribe-button:active{
    opacity: 0.5;
   
  }


</style>

<button class="subscribe-button">
  SUBSCRIBE 
</button>

<style>
  .join-button{
    background-color: white;
    color: rgb(88, 88, 233);
    border-color: rgb(64, 136, 219);
    border-style: solid;
     border-width: 1px;
    border-radius: 2px;
    cursor: pointer;
     padding-top: 9px;
    padding-bottom:9px;
    padding-left: 16px;
    padding-right: 16px;

    transition: background-color 1s,color 1s;
  }
  .join-button:hover{
    background-color: blue;
    color:white;
  }
  .join-button:active{
    opacity:0.7;
  }

</style>

<button class="join-button">
  JOIN 
</button>

<style>
  .tweet-button{
    background-color:rgb(29, 155, 240);
    color: white;
    border: none;
    height: 36px;
    width: 75px;
    border-radius: 18px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin-left: 7px;
    vertical-align: top;
      transition: box-shadow 0.15s;
  }

  .tweet-button:hover{
    box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.2);
  }
</style>

<button class="tweet-button">
  Tweet
</button>
